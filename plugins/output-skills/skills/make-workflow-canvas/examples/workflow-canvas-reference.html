<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workflow Canvas Reference</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f7f7f5;
      --surface: #fcfcfb;
      --surface-strong: #ffffff;
      --surface-soft: #f1f1ee;
      --ink: #0b0b0b;
      --ink-2: #52514e;
      --muted: #6f6d68;
      --line: #e1e0d9;
      --line-strong: #c3c2b7;
      --accent: #256abf;
      --accent-soft: #eaf3fd;
      --good: #0ca30c;
      --warning: #a96600;
      --critical: #d03b3b;
      --series-1: #2a78d6;
      --series-2: #1baf7a;
      --series-3: #eda100;
      --series-4: #008300;
      --series-5: #4a3aa7;
      --series-6: #e34948;
      --series-7: #e87ba4;
      --series-8: #eb6834;
      --node-width: 224px;
      --toolbar-height: 46px;
      --bottom-height: 220px;
      --radius: 6px;
      --shadow: 0 1px 2px rgba(11, 11, 11, .08), 0 8px 24px rgba(11, 11, 11, .04);
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --sans: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { font-family: var(--sans); color: var(--ink); background: var(--page); font-size: 12px; }
    button, input, select, textarea { font: inherit; color: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .46; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: var(--toolbar-height) minmax(0, 1fr) var(--bottom-height);
      background: var(--surface);
    }
    .app.bottom-collapsed { grid-template-rows: var(--toolbar-height) minmax(0, 1fr) 34px; }

    .toolbar {
      display: flex;
      align-items: center;
      min-width: 0;
      border-bottom: 1px solid var(--line);
      background: var(--surface-strong);
      padding: 0 10px;
      gap: 10px;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 222px;
      font-weight: 700;
    }

    .brand-mark {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 5px;
      color: #fff;
      background: #111827;
      font-size: 11px;
      letter-spacing: -.02em;
    }

    .brand-name { color: var(--accent); }
    .crumb { color: var(--muted); font-weight: 500; }
    .title-input {
      min-width: 160px;
      max-width: 250px;
      border: 0;
      background: transparent;
      font-weight: 650;
      padding: 4px 5px;
      border-radius: 4px;
    }

    .version, .save-state {
      font-family: var(--mono);
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
    }

    .toolbar-spacer { flex: 1; }
    .mode-tabs, .toolbar-actions { display: flex; align-items: center; gap: 3px; }

    .tool-button, .mode-button, .icon-button {
      min-height: 30px;
      border: 1px solid transparent;
      border-radius: 5px;
      background: transparent;
      padding: 0 9px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--ink-2);
      white-space: nowrap;
    }

    .tool-button:hover, .mode-button:hover, .icon-button:hover { background: var(--surface-soft); color: var(--ink); }
    .mode-button.active { background: var(--surface-soft); border-color: var(--line); color: var(--ink); }
    .tool-button.primary { color: #fff; background: #111827; border-color: #111827; }
    .tool-button.primary:hover { background: #273143; }
    .tool-button.danger { color: var(--critical); }
    .shortcut { color: var(--muted); font-family: var(--mono); font-size: 9px; }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: 236px minmax(0, 1fr) 310px;
      overflow: hidden;
    }

    .palette, .inspector {
      min-width: 0;
      overflow: hidden;
      background: var(--surface-strong);
      display: flex;
      flex-direction: column;
    }
    .palette { border-right: 1px solid var(--line); }
    .inspector { border-left: 1px solid var(--line); }

    .panel-heading {
      min-height: 42px;
      padding: 0 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--ink-2);
      font-size: 10px;
      font-weight: 700;
    }

    .collapse-button {
      width: 24px;
      height: 24px;
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 4px;
    }

    .palette-search-wrap { padding: 10px; border-bottom: 1px solid var(--line); }
    .search-box { position: relative; }
    .search-box input {
      width: 100%;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 0 28px 0 30px;
      background: var(--surface);
    }
    .search-box .search-icon { position: absolute; left: 9px; top: 8px; color: var(--muted); }
    .search-box .search-key { position: absolute; right: 8px; top: 7px; font-family: var(--mono); color: var(--muted); }

    .palette-scroll, .inspector-scroll { flex: 1; min-height: 0; overflow: auto; }
    .palette-empty { padding: 18px 12px; color: var(--muted); text-align: center; }

    .palette-group { border-bottom: 1px solid rgba(225, 224, 217, .65); }
    .group-button {
      width: 100%;
      height: 34px;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 10px;
      border: 0;
      background: transparent;
      color: var(--ink-2);
      text-transform: uppercase;
      letter-spacing: .07em;
      font-size: 10px;
      font-weight: 700;
      text-align: left;
    }
    .group-button:hover { background: var(--surface-soft); }
    .group-caret { width: 10px; color: var(--muted); }
    .group-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--category-color); }
    .group-count { margin-left: auto; color: var(--muted); font-family: var(--mono); }

    .palette-item {
      min-height: 48px;
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      cursor: grab;
      user-select: none;
    }
    .palette-item:hover { background: var(--surface-soft); }
    .palette-item:active { cursor: grabbing; }
    .type-icon {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      border-radius: 4px;
      color: #fff;
      background: var(--category-color);
      font-weight: 800;
      font-size: 10px;
    }
    .palette-label { font-size: 11px; font-weight: 650; line-height: 1.25; }
    .palette-type { color: var(--muted); font-family: var(--mono); font-size: 9px; line-height: 1.25; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .palette-badge { font-family: var(--mono); font-size: 8px; color: var(--ink-2); background: var(--surface-soft); border: 1px solid var(--line); padding: 2px 4px; border-radius: 3px; }

    .canvas-shell { position: relative; min-width: 0; min-height: 0; overflow: hidden; background: var(--surface); }
    .canvas {
      position: absolute;
      inset: 0;
      overflow: hidden;
      touch-action: none;
      cursor: grab;
      background-color: var(--surface);
      background-image: radial-gradient(circle, rgba(82, 81, 78, .18) 1px, transparent 1px);
      background-size: 16px 16px;
    }
    .canvas.panning { cursor: grabbing; }
    .canvas.connecting { cursor: crosshair; }

    .world {
      position: absolute;
      left: 0;
      top: 0;
      width: 4000px;
      height: 2400px;
      transform-origin: 0 0;
      will-change: transform;
    }
    .edge-layer, .node-layer { position: absolute; inset: 0; width: 4000px; height: 2400px; overflow: visible; }
    .edge-layer { pointer-events: none; }
    .node-layer { pointer-events: none; }

    .edge-visible { fill: none; stroke: #8d8b86; stroke-width: 1.8; marker-end: url(#arrow-data); }
    .edge-visible.control { stroke: var(--series-5); stroke-dasharray: 6 4; marker-end: url(#arrow-control); }
    .edge-visible.error { stroke: var(--critical); stroke-dasharray: 3 4; marker-end: url(#arrow-error); }
    .edge-visible.event { stroke: var(--series-1); marker-end: url(#arrow-event); }
    .edge-visible.trace { stroke: var(--series-1); stroke-dasharray: 2 5; marker-end: url(#arrow-event); }
    .edge-visible.selected { stroke-width: 3; filter: drop-shadow(0 0 3px rgba(42, 120, 214, .34)); }
    .edge-hit { fill: none; stroke: transparent; stroke-width: 14; pointer-events: stroke; cursor: pointer; }
    .edge-label rect { fill: rgba(252, 252, 251, .94); stroke: var(--line); rx: 4; }
    .edge-label text { fill: var(--ink-2); font-family: var(--mono); font-size: 9px; }
    .draft-edge { fill: none; stroke: var(--accent); stroke-width: 2; stroke-dasharray: 5 4; pointer-events: none; }

    .node {
      position: absolute;
      width: var(--node-width);
      min-height: 136px;
      background: var(--surface-strong);
      border: 1px solid var(--line-strong);
      border-left: 3px solid var(--category-color);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      pointer-events: auto;
      user-select: none;
      overflow: visible;
    }
    .node:hover { border-color: #aaa8a1; }
    .node:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
    .node.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(42, 120, 214, .14), var(--shadow); }
    .node.related { box-shadow: 0 0 0 2px rgba(27, 175, 122, .16), var(--shadow); }
    .node.dimmed { opacity: .46; }
    .node.running { border-color: var(--accent); }
    .node.succeeded { border-color: var(--good); }
    .node.failed { border-color: var(--critical); }

    .node-head {
      min-height: 42px;
      padding: 8px 9px 6px 8px;
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr) auto;
      gap: 7px;
      align-items: start;
      cursor: move;
    }
    .node-title { font-size: 11px; font-weight: 720; line-height: 1.25; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .node-type { color: var(--muted); font-family: var(--mono); font-size: 8.5px; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status-chip { display: inline-flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 8px; color: var(--ink-2); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .status-dot.active, .status-dot.succeeded { background: var(--good); }
    .status-dot.running { background: var(--accent); }
    .status-dot.paused, .status-dot.draft { background: var(--warning); }
    .status-dot.failing, .status-dot.failed { background: var(--critical); }

    .node-description { min-height: 34px; max-height: 42px; padding: 0 9px 7px 37px; color: var(--ink-2); font-size: 9.5px; line-height: 1.35; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 3; overflow: hidden; }
    .node-meta { min-height: 29px; padding: 6px 8px; border-top: 1px solid var(--line); display: flex; align-items: center; gap: 5px; overflow: hidden; }
    .meta-pill { min-width: 0; padding: 2px 5px; border-radius: 3px; background: var(--surface-soft); color: var(--ink-2); font-size: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .meta-pill.mono { font-family: var(--mono); }
    .latency-pill { margin-left: auto; color: var(--accent); background: var(--accent-soft); font-family: var(--mono); }

    .port {
      position: absolute;
      top: var(--port-y);
      display: flex;
      align-items: center;
      gap: 4px;
      height: 16px;
      font-family: var(--mono);
      font-size: 8px;
      color: var(--muted);
      pointer-events: auto;
      cursor: crosshair;
    }
    .port.input { right: calc(100% - 5px); flex-direction: row-reverse; }
    .port.output { left: calc(100% - 5px); }
    .port-dot {
      width: 10px;
      height: 10px;
      border: 2px solid var(--surface-strong);
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
      flex: 0 0 auto;
    }
    .port.input .port-dot { background: var(--series-2); box-shadow: 0 0 0 1px var(--series-2); }
    .port-label { max-width: 48px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: rgba(252, 252, 251, .9); padding: 0 2px; }
    .port.invalid .port-dot { background: var(--critical); box-shadow: 0 0 0 1px var(--critical); }
    .port:focus-visible { outline: none; }
    .port:focus-visible .port-dot { box-shadow: 0 0 0 3px var(--surface-strong), 0 0 0 5px var(--accent); }

    .canvas-banner {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 7px;
      min-height: 27px;
      padding: 0 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(252, 252, 251, .92);
      color: var(--ink-2);
      box-shadow: 0 2px 10px rgba(11, 11, 11, .05);
      z-index: 9;
      pointer-events: none;
    }
    .banner-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .canvas-banner strong { color: var(--accent); font-size: 10px; }
    .canvas-banner span { font-size: 9px; }

    .viewport-controls {
      position: absolute;
      left: 10px;
      bottom: 10px;
      z-index: 10;
      display: flex;
      align-items: center;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: rgba(252, 252, 251, .95);
      box-shadow: 0 2px 8px rgba(11, 11, 11, .05);
    }
    .viewport-controls button { width: 29px; height: 29px; border: 0; border-right: 1px solid var(--line); background: transparent; }
    .viewport-controls button:hover { background: var(--surface-soft); }
    .zoom-readout { min-width: 48px; text-align: center; font-family: var(--mono); color: var(--ink-2); font-size: 9px; }

    .minimap {
      position: absolute;
      right: 10px;
      bottom: 10px;
      width: 150px;
      height: 92px;
      border: 1px solid var(--line);
      border-radius: 5px;
      background: rgba(252, 252, 251, .94);
      box-shadow: 0 2px 8px rgba(11, 11, 11, .05);
      z-index: 10;
      overflow: hidden;
    }
    .minimap-title { position: absolute; top: 5px; left: 7px; font-family: var(--mono); font-size: 8px; color: var(--muted); letter-spacing: .08em; }
    .mini-node { position: absolute; height: 5px; min-width: 7px; border-radius: 1px; background: var(--category-color); opacity: .72; }
    .mini-viewport { position: absolute; border: 1px solid var(--accent); background: rgba(42, 120, 214, .05); pointer-events: none; }

    .toast-stack { position: absolute; right: 10px; top: 10px; z-index: 30; display: grid; gap: 6px; pointer-events: none; }
    .toast { min-width: 230px; max-width: 340px; padding: 9px 11px; border: 1px solid var(--line); border-left: 3px solid var(--accent); border-radius: 5px; background: var(--surface-strong); box-shadow: var(--shadow); color: var(--ink-2); animation: toast-in .16s ease-out; }
    .toast.error { border-left-color: var(--critical); }
    .toast.success { border-left-color: var(--good); }
    @keyframes toast-in { from { opacity: 0; transform: translateY(-4px); } }

    .empty-state { margin: auto; max-width: 230px; padding: 32px 20px; text-align: center; color: var(--muted); }
    .empty-state strong { display: block; color: var(--ink); margin: 9px 0 5px; }

    .inspector-content { padding: 12px; display: grid; gap: 13px; }
    .form-section { display: grid; gap: 8px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
    .form-section:last-child { border-bottom: 0; }
    .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--ink-2); font-weight: 750; }
    .field { display: grid; gap: 4px; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .field label { color: var(--ink-2); font-size: 9px; font-weight: 650; }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--surface);
      padding: 6px 7px;
      font-size: 10px;
    }
    .field textarea { min-height: 66px; resize: vertical; line-height: 1.4; }
    .field .mono-input { font-family: var(--mono); }
    .help { color: var(--muted); font-size: 8.5px; line-height: 1.35; }
    .inspector-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .small-button { height: 28px; border: 1px solid var(--line); border-radius: 4px; background: var(--surface); padding: 0 8px; color: var(--ink-2); }
    .small-button:hover { background: var(--surface-soft); color: var(--ink); }
    .small-button.danger { color: var(--critical); }

    .port-editor { display: grid; gap: 6px; }
    .port-editor-row { display: grid; grid-template-columns: 18px minmax(0, 1fr) minmax(0, 1fr) auto 24px; gap: 5px; align-items: center; }
    .port-direction { width: 18px; height: 18px; display: grid; place-items: center; border-radius: 3px; font-family: var(--mono); font-size: 8px; color: #fff; background: var(--series-2); }
    .port-editor-row.output .port-direction { background: var(--accent); }
    .port-editor-row > input { min-width: 0; width: 100%; border: 1px solid var(--line); border-radius: 4px; padding: 5px; font-family: var(--mono); font-size: 8.5px; }
    .port-flags { display: flex; gap: 4px; align-items: center; }
    .port-flag { display: inline-flex; gap: 2px; align-items: center; color: var(--muted); font-family: var(--mono); font-size: 8px; }
    .port-flag input { width: 12px; height: 12px; margin: 0; accent-color: var(--accent); }
    .remove-port { width: 24px; height: 24px; border: 0; border-radius: 4px; background: transparent; color: var(--critical); }
    .remove-port:hover { background: #fff0ef; }

    .bottom-panel {
      min-height: 0;
      display: grid;
      grid-template-rows: 34px minmax(0, 1fr);
      border-top: 1px solid var(--line);
      background: var(--surface-strong);
      z-index: 15;
    }
    .bottom-panel.collapsed { grid-template-rows: 34px 0; }
    .bottom-tabs { display: flex; align-items: stretch; gap: 0; padding-left: 236px; border-bottom: 1px solid var(--line); }
    .bottom-tablist { display: flex; align-items: stretch; }
    .bottom-tab { border: 0; border-right: 1px solid transparent; background: transparent; padding: 0 13px; color: var(--ink-2); }
    .bottom-tab:hover { background: var(--surface-soft); }
    .bottom-tab.active { color: var(--ink); background: var(--surface); border-right-color: var(--line); border-left: 1px solid var(--line); }
    .tab-count { margin-left: 4px; font-family: var(--mono); color: var(--muted); }
    .bottom-collapse { margin-left: auto; width: 34px; border: 0; border-left: 1px solid var(--line); background: transparent; color: var(--muted); }
    .bottom-content { min-height: 0; overflow: auto; }

    .issue-list, .diagnostic-list, .log-list { min-width: 760px; }
    .issue-row, .diagnostic-row, .log-row {
      min-height: 28px;
      display: grid;
      align-items: center;
      gap: 10px;
      padding: 4px 12px 4px 246px;
      border-bottom: 1px solid rgba(225, 224, 217, .55);
      font-family: var(--mono);
      font-size: 9px;
    }
    .issue-row { grid-template-columns: 56px 210px minmax(0, 1fr); cursor: pointer; }
    .issue-row:hover { background: var(--surface-soft); }
    .diagnostic-row { grid-template-columns: 90px 48px 180px minmax(0, 1fr); }
    .log-row { grid-template-columns: 72px 54px 170px minmax(0, 1fr); }
    .severity { font-weight: 800; text-transform: uppercase; }
    .severity.error { color: var(--critical); }
    .severity.warning { color: var(--warning); }
    .severity.info { color: var(--accent); }
    .diagnostic-level.error { color: var(--critical); }
    .diagnostic-level.warn { color: var(--warning); }
    .diagnostic-level.info { color: var(--good); }
    .row-muted { color: var(--muted); }
    .bottom-empty { padding: 32px 20px 32px 246px; color: var(--muted); }
    .bottom-toolbar { min-height: 34px; display: flex; justify-content: flex-end; gap: 6px; padding: 4px 12px 4px 246px; border-bottom: 1px solid var(--line); }
    .json-view { margin: 0; padding: 14px 18px 24px 246px; font-family: var(--mono); font-size: 9px; line-height: 1.5; color: var(--ink-2); white-space: pre-wrap; word-break: break-word; }

    .compact-hidden { display: inline-flex; }
    body.palette-collapsed .main { grid-template-columns: 44px minmax(0, 1fr) 310px; }
    body.palette-collapsed .palette-search-wrap, body.palette-collapsed .group-button span:not(.group-dot):not(.group-caret), body.palette-collapsed .group-count, body.palette-collapsed .palette-item > :not(.type-icon) { display: none; }
    body.palette-collapsed .palette-item { grid-template-columns: 22px; justify-content: center; padding: 7px 10px; }
    body.palette-collapsed .panel-heading span { display: none; }
    body.palette-collapsed .bottom-tabs, body.palette-collapsed .issue-row, body.palette-collapsed .diagnostic-row, body.palette-collapsed .log-row, body.palette-collapsed .bottom-toolbar, body.palette-collapsed .json-view, body.palette-collapsed .bottom-empty { padding-left: 44px; }
    body.inspector-collapsed .main { grid-template-columns: 236px minmax(0, 1fr) 44px; }
    body.inspector-collapsed .inspector-scroll, body.inspector-collapsed .panel-heading span { display: none; }
    body.palette-collapsed.inspector-collapsed .main { grid-template-columns: 44px minmax(0, 1fr) 44px; }

    @media (max-width: 1360px) {
      .brand { min-width: 196px; }
      .compact-hidden { display: none; }
      .main { grid-template-columns: 216px minmax(0, 1fr) 282px; }
      .bottom-tabs, .issue-row, .diagnostic-row, .log-row, .bottom-toolbar, .json-view, .bottom-empty { padding-left: 216px; }
      body.palette-collapsed .main { grid-template-columns: 44px minmax(0, 1fr) 282px; }
      body.inspector-collapsed .main { grid-template-columns: 216px minmax(0, 1fr) 44px; }
      body.palette-collapsed.inspector-collapsed .main { grid-template-columns: 44px minmax(0, 1fr) 44px; }
    }

    @media (max-width: 1080px) {
      .brand { min-width: 160px; }
      .title-input { max-width: 185px; }
      .mode-button, .tool-button { padding: 0 6px; font-size: 10px; }
      .main { grid-template-columns: 44px minmax(0, 1fr) 44px; }
      .palette-search-wrap, .palette .group-button span:not(.group-dot):not(.group-caret), .palette .group-count, .palette-item > :not(.type-icon), .inspector-scroll, .palette .panel-heading span, .inspector .panel-heading span { display: none; }
      .palette-item { grid-template-columns: 22px; justify-content: center; padding: 7px 10px; }
      .bottom-tabs, .issue-row, .diagnostic-row, .log-row, .bottom-toolbar, .json-view, .bottom-empty { padding-left: 44px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; transition-duration: .001ms !important; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <header class="toolbar" aria-label="Workflow toolbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">WC</div>
        <span class="brand-name">WorkflowCanvas</span>
        <span class="crumb">/</span>
        <input class="title-input" id="graph-title" aria-label="Workflow title" value="">
      </div>
      <span class="version" id="artifact-version"></span>
      <span class="save-state" id="save-state">local draft</span>
      <div class="toolbar-spacer"></div>
      <nav class="mode-tabs" aria-label="Canvas modes" id="mode-tabs">
        <button class="mode-button active" type="button" data-mode="design" title="Design mode"><span>Design</span></button>
        <button class="mode-button" type="button" data-mode="contracts" title="Contracts mode"><span>Contracts</span></button>
        <button class="mode-button" type="button" data-mode="preview" title="Synthetic preview"><span>Preview</span></button>
        <button class="mode-button" type="button" data-mode="trace" title="Observed trace" disabled><span>Trace</span></button>
        <button class="mode-button" type="button" data-mode="docs" title="Documentation mode"><span>Docs</span></button>
      </nav>
      <div class="toolbar-actions">
        <input type="file" id="import-file" accept="application/json,.json" hidden>
        <button class="tool-button" id="import-button" type="button" title="Import workflow JSON"><span>Import</span></button>
        <button class="tool-button" id="export-button" type="button" title="Export workflow JSON"><span>Export</span></button>
        <button class="tool-button compact-hidden" id="undo-button" type="button" title="Undo (Ctrl+Z)">Undo</button>
        <button class="tool-button compact-hidden" id="redo-button" type="button" title="Redo (Ctrl+Shift+Z)">Redo</button>
        <button class="tool-button" id="save-button" type="button" title="Save local draft"><span>Save</span></button>
        <button class="tool-button" id="validate-button" type="button" title="Validate graph"><span>Validate</span></button>
        <button class="tool-button primary" id="preview-button" type="button" title="Start synthetic preview"><span>Preview run</span></button>
      </div>
    </header>

    <main class="main">
      <aside class="palette" aria-label="Node palette">
        <div class="panel-heading"><span>Node palette</span><button class="collapse-button" id="palette-collapse" type="button" aria-label="Collapse node palette">&lt;</button></div>
        <div class="palette-search-wrap">
          <div class="search-box">
            <span class="search-icon" aria-hidden="true">Q</span>
            <input id="palette-search" type="search" placeholder="Search nodes..." autocomplete="off">
            <span class="search-key">/</span>
          </div>
        </div>
        <div class="palette-scroll" id="palette-list"></div>
      </aside>

      <section class="canvas-shell" aria-label="Workflow canvas">
        <div class="canvas" id="canvas" tabindex="0">
          <div class="world" id="world">
            <svg class="edge-layer" id="edge-layer" aria-label="Workflow connections">
              <defs>
                <marker id="arrow-data" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#8d8b86"></path></marker>
                <marker id="arrow-control" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#4a3aa7"></path></marker>
                <marker id="arrow-error" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#d03b3b"></path></marker>
                <marker id="arrow-event" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#2a78d6"></path></marker>
              </defs>
            </svg>
            <div class="node-layer" id="node-layer"></div>
          </div>
          <div class="canvas-banner" id="canvas-banner"><span class="banner-dot"></span><strong>Design mode</strong><span>Edit workflow structure</span></div>
          <div class="viewport-controls" aria-label="Viewport controls">
            <button type="button" id="zoom-out" aria-label="Zoom out">-</button>
            <span class="zoom-readout" id="zoom-readout">100%</span>
            <button type="button" id="zoom-in" aria-label="Zoom in">+</button>
            <button type="button" id="fit-view" aria-label="Fit workflow">Fit</button>
          </div>
          <div class="minimap" id="minimap" aria-label="Workflow minimap"><span class="minimap-title">MAP</span></div>
          <div class="toast-stack" id="toast-stack" aria-live="polite"></div>
        </div>
      </section>

      <aside class="inspector" aria-label="Inspector">
        <div class="panel-heading"><span id="inspector-heading">Inspector</span><button class="collapse-button" id="inspector-collapse" type="button" aria-label="Collapse inspector">&gt;</button></div>
        <div class="inspector-scroll" id="inspector-content"></div>
      </aside>
    </main>

    <section class="bottom-panel" id="bottom-panel" aria-label="Workflow diagnostics">
      <div class="bottom-tabs" id="bottom-tabs">
        <div class="bottom-tablist" role="tablist" aria-label="Workflow details">
          <button class="bottom-tab active" id="tab-validation" type="button" data-tab="validation" role="tab" aria-controls="bottom-content" aria-selected="true">Validation <span class="tab-count" id="validation-count">0</span></button>
          <button class="bottom-tab" id="tab-preview" type="button" data-tab="preview" role="tab" aria-controls="bottom-content" aria-selected="false" tabindex="-1">Synthetic preview <span class="tab-count" id="preview-count">0</span></button>
          <button class="bottom-tab" id="tab-diagnostics" type="button" data-tab="diagnostics" role="tab" aria-controls="bottom-content" aria-selected="false" tabindex="-1">Diagnostics <span class="tab-count" id="diagnostic-count">0</span></button>
          <button class="bottom-tab" id="tab-json" type="button" data-tab="json" role="tab" aria-controls="bottom-content" aria-selected="false" tabindex="-1">JSON</button>
        </div>
        <button class="bottom-collapse" id="bottom-collapse" type="button" aria-label="Collapse diagnostics panel">v</button>
      </div>
      <div class="bottom-content" id="bottom-content" role="tabpanel" aria-labelledby="tab-validation"></div>
    </section>
  </div>

    function normalizeClaimStatus(value, evidence, trustedClaims) {
      if (value === "observed") return trustedClaims && evidence.length ? "observed" : "inferred";
      return ["inferred", "proposed", "unknown"].includes(value) ? value : "unknown";
    }

    function normalizeNodeMetadata(metadata, trustedClaims) {
      const input = metadata && typeof metadata === "object" ? metadata : {};
      const evidence = Array.isArray(input.evidence) ? input.evidence.slice(0, 20).map(item => cleanString(item, "", 200)).filter(Boolean) : [];
      return {
        confidence: ["high", "medium", "low"].includes(input.confidence) ? input.confidence : "medium",
        fact_status: normalizeClaimStatus(input.fact_status, evidence, trustedClaims),
        evidence
      };
    }

    function normalizePort(port, index) {
      return {
        id: safeId(port && port.id) || `port-${index + 1}`,
        label: cleanString(port && port.label, `port ${index + 1}`, 48),
        schema: safeId(port && port.schema) || "any",
        required: Boolean(port && port.required),
        multiple: Boolean(port && port.multiple)
      };
    }

    function normalizeModel(input, options = {}) {
      if (!input || typeof input !== "object" || input.schema_version !== "workflow-canvas/1") throw new Error("unsupported_schema_version");
      const trustedClaims = options.trustedClaims === true;
      const artifact = input.artifact && typeof input.artifact === "object" ? input.artifact : {};

      const graph = input.graph && typeof input.graph === "object" ? input.graph : {};
      const runtime = input.runtime && typeof input.runtime === "object" ? input.runtime : {};

      const categories = Array.isArray(catalog.categories) ? catalog.categories.slice(0, 24).map((category, index) => ({
        id: safeId(category.id) || `category-${index + 1}`,
        label: cleanString(category.label, `Category ${index + 1}`, 48),

        label: cleanString(type.label, `Node type ${index + 1}`, 72),
        description: cleanString(type.description, "", 180),
        category: safeId(type.category) || (categories[0] ? categories[0].id : "uncategorized"),
        owner: cleanString(type.owner, "unassigned", 48),

      })) : [];
      const typeIds = new Set(nodeTypes.map(type => type.type));
      const schemas = Array.isArray(graph.schemas) ? graph.schemas.slice(0, 120).map((schema, index) => ({
        id: safeId(schema.id) || `schema/${index + 1}`,
        label: cleanString(schema.label, `Schema ${index + 1}`, 72)
      })) : [];
      const nodes = Array.isArray(graph.nodes) ? graph.nodes.slice(0, 300).map((node, index) => ({
        id: safeId(node.id) || `node-${index + 1}`,
        type: safeId(node.type) || (nodeTypes[0] ? nodeTypes[0].type : "unknown.node"),
        label: cleanString(node.label, `Node ${index + 1}`, 96),
        description: cleanString(node.description, "", 240),
        category: safeId(node.category) || (categories[0] ? categories[0].id : "uncategorized"),
        owner: cleanString(node.owner, "unassigned", 48),
        status: cleanString(node.status, "unknown", 16),
        position: {
          x: clamp(integer(node.position && node.position.x, 80 + index * 32), 0, WORLD_WIDTH - NODE_WIDTH),
          y: clamp(integer(node.position && node.position.y, 80 + index * 24), 0, WORLD_HEIGHT - NODE_HEIGHT)
        },
        ports: {
          inputs: Array.isArray(node.ports && node.ports.inputs) ? node.ports.inputs.slice(0, 12).map(normalizePort) : [],
          outputs: Array.isArray(node.ports && node.ports.outputs) ? node.ports.outputs.slice(0, 12).map(normalizePort) : []
        },
        metadata: normalizeNodeMetadata(node.metadata, trustedClaims)
      })) : [];
      for (const node of nodes) node.position.y = clamp(node.position.y, 0, WORLD_HEIGHT - nodeHeight(node));
      const edges = Array.isArray(graph.edges) ? graph.edges.slice(0, 800).map((edge, index) => ({
        id: safeId(edge.id) || `edge-${index + 1}`,
        source: { node: safeId(edge.source && edge.source.node), port: safeId(edge.source && edge.source.port) },
        target: { node: safeId(edge.target && edge.target.node), port: safeId(edge.target && edge.target.port) },
        kind: safeId(edge.kind) || "data",
        label: cleanString(edge.label, "", 48),
        async: Boolean(edge.async)
      })) : [];
      const preview = runtime.preview && typeof runtime.preview === "object" ? runtime.preview : { kind: "synthetic", label: "Synthetic preview", steps: [] };
