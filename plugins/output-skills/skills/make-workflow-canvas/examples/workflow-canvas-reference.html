          trusted: run.verification.trusted === true,
          algorithm: cleanString(run.verification.algorithm, "", 16),
          digest: cleanString(run.verification.digest, "", 64).toLowerCase(),
          status: "unverified"
        },
        steps: run.steps.map(step => ({
          node_id: safeId(step.node_id),
          status: ["pending", "running", "succeeded", "failed", "skipped"].includes(step.status) ? step.status : "pending",
          offset_ms: clamp(integer(step.offset_ms, 0), 0, 3600000),
          duration_ms: clamp(integer(step.duration_ms, 0), 0, 3600000),
          error_code: safeId(step.error_code)
        }))
      };
    }

    const compareText = (left, right) => left < right ? -1 : left > right ? 1 : 0;
    const byId = (left, right) => compareText(left.id, right.id);

    function graphDigestPayload(model) {
      return {
        schema_version: "workflow-canvas-graph/1",
        artifact: { id: model.artifact.id, version: model.artifact.version, title: model.artifact.title, purpose: model.artifact.purpose },
        graph: {
          metadata: {
            name: model.graph.metadata.name,
            description: model.graph.metadata.description,
            mode: model.graph.metadata.mode
          },
          schemas: model.graph.schemas.map(schema => ({ id: schema.id, label: schema.label })).sort(byId),
          nodes: model.graph.nodes.map(node => ({
            id: node.id,
            type: node.type,
            label: node.label,
            description: node.description,
            category: node.category,
            owner: node.owner,
            status: node.status,
            position: { x: integer(node.position.x), y: integer(node.position.y) },
            ports: {
              inputs: node.ports.inputs.map(port => ({ id: port.id, label: port.label, schema: port.schema, required: port.required, multiple: port.multiple })).sort(byId),
              outputs: node.ports.outputs.map(port => ({ id: port.id, label: port.label, schema: port.schema, required: port.required, multiple: port.multiple })).sort(byId)
            },
            metadata: {
              confidence: node.metadata.confidence,
              fact_status: node.metadata.fact_status,
              evidence: node.metadata.evidence.slice().sort(compareText)
            }
          })).sort(byId),
          edges: model.graph.edges.map(edge => ({
            id: edge.id,
            source: { node: edge.source.node, port: edge.source.port },
            target: { node: edge.target.node, port: edge.target.port },
            kind: edge.kind,
            label: edge.label,
            async: edge.async
          })).sort(byId)
        }
      };
    }

    async function sha256Hex(value) {
      if (!window.crypto || !window.crypto.subtle || typeof TextEncoder !== "function") return "";
      const encoded = new TextEncoder().encode(JSON.stringify(value));
      const digest = await window.crypto.subtle.digest(OBSERVED_DIGEST_ALGORITHM, encoded);
      return Array.from(new Uint8Array(digest), byte => byte.toString(16).padStart(2, "0")).join("");
    }

    function observedDigestPayload(run) {
      return {
        schema_version: "workflow-observed-run/1",
        observed_run: {
          id: run.id,
          kind: "observed",
          label: run.label,
          captured_at: run.captured_at,
          sanitized: true,
          artifact_id: run.artifact_id,
          artifact_version: run.artifact_version,
          graph_digest: run.graph_digest,
          provenance: { type: run.provenance.type, source: run.provenance.source },
          steps: run.steps.map(step => ({
            node_id: step.node_id,
            status: step.status,
            offset_ms: integer(step.offset_ms),
            duration_ms: integer(step.duration_ms),
            error_code: step.error_code || ""
          }))
        }
      };
    }

    async function observedDigest(run) {
      return sha256Hex(observedDigestPayload(run));
    }

    async function workflowGraphDigest(model) {
      return sha256Hex(graphDigestPayload(model));
    }

    async function verifyObservedRun(run, model) {
      if (!run || !model) return run || null;
      const verification = run.verification;
      const claimedDigest = verification.digest;
      const activeNodeIds = new Set(model.graph.nodes.map(node => node.id));
      const eligible = verification.trusted === true && verification.algorithm === OBSERVED_DIGEST_ALGORITHM && /^[0-9a-f]{64}$/.test(claimedDigest) && TRUSTED_OBSERVED_DIGESTS.has(claimedDigest) && run.artifact_id === model.artifact.id && run.artifact_version === model.artifact.version && /^[0-9a-f]{64}$/.test(run.graph_digest) && run.steps.every(step => activeNodeIds.has(step.node_id));
      if (!eligible) return run;
      const activeGraphDigest = await workflowGraphDigest(model);
      if (!activeGraphDigest || activeGraphDigest !== run.graph_digest) return run;
      const computedDigest = await observedDigest(run);
      if (!computedDigest || computedDigest !== claimedDigest) return run;
      return {
        ...run,
        kind: "observed",
        verification: { ...verification, status: "verified" }
      };
    }

    async function verifyObservedRuns(runs, model) {
      return Promise.all(runs.map(run => verifyObservedRun(run, model)));
    }

    function verifiedObservedRuns() {
      return state.model.runtime.observed_runs.filter(run => run.kind === "observed" && run.verification && run.verification.status === "verified");
    }

    const diagnosticTokens = new Map();
    let diagnosticTokenSequence = 0;
    const embeddedModel = normalizeModel(parseInitialModel(), { trustedClaims: true });
    const EMBEDDED_ARTIFACT_ID = embeddedModel.artifact.id;
    const LOCAL_STORAGE_KEY = `workflow-canvas:${EMBEDDED_ARTIFACT_ID}:v1`;

    const state = {
      model: embeddedModel,
      selected: null,
      view: { x: 40, y: 30, scale: 1 },
      history: [],
      future: [],
      issues: [],
      diagnostics: [],
      bottomTab: "validation",
      bottomCollapsed: false,
      collapsedGroups: new Set(),
      mode: "design",
      connection: null,
      drag: null,
      pan: null,
      preview: { active: false, startedAt: 0, statuses: new Map(), logs: [], frameId: null, events: [], eventIndex: 0 },
      observedRunId: null,
      rendering: false
    };

    function diagnosticToken(kind, value) {
      const mapKey = `${kind}:${String(value)}`;
      if (!diagnosticTokens.has(mapKey)) {
        const prefix = kind === "node_id" ? "n" : kind === "edge_id" ? "e" : "p";
        diagnosticTokens.set(mapKey, `${prefix}-${++diagnosticTokenSequence}`);
      }
      return diagnosticTokens.get(mapKey);
    }

    function diagnostic(event, level = "info", fields = {}) {
      const record = { ts: new Date().toISOString(), level: ["info", "warn", "error"].includes(level) ? level : "info", event: safeId(event) || "unknown_event" };
      for (const [key, value] of Object.entries(fields || {})) {
        if (!ALLOWED_DIAGNOSTIC_FIELDS.has(key)) continue;
        if (["count", "duration_ms"].includes(key)) record[key] = clamp(finite(value, 0), 0, 3600000);
        else if (["node_id", "edge_id", "port_id"].includes(key)) record[key] = diagnosticToken(key, value);
        else record[key] = safeId(value);
      }
      state.diagnostics.push(record);
      if (state.diagnostics.length > DIAGNOSTIC_LIMIT) state.diagnostics.splice(0, state.diagnostics.length - DIAGNOSTIC_LIMIT);
      dom.diagnosticCount.textContent = String(state.diagnostics.length);
      if (state.bottomTab === "diagnostics") renderBottom();
    }

    function errorCode(error) {
      const message = error && typeof error === "object" && typeof error.message === "string" ? error.message : "";
      if (SAFE_ERROR_CODES.has(message)) return message;
      const name = error && typeof error === "object" && typeof error.name === "string" ? error.name : "";
      if (SAFE_ERROR_NAMES.has(name)) return name.replace(/([a-z])([A-Z])/g, "$1_$2").toLowerCase();
      return "unexpected_error";
    }

    function categoryById(id) { return state.model.catalog.categories.find(category => category.id === id); }
    function nodeTypeById(type) { return state.model.catalog.node_types.find(item => item.type === type); }
    function nodeById(id) { return state.model.graph.nodes.find(node => node.id === id); }
    function edgeById(id) { return state.model.graph.edges.find(edge => edge.id === id); }
    function portByRef(nodeId, portId, direction) {
      const node = nodeById(nodeId);
      if (!node) return null;
      const list = direction === "input" ? node.ports.inputs : node.ports.outputs;
      return list.find(port => port.id === portId) || null;
    }

    function categoryColor(id) { const category = categoryById(id); return category ? category.color : "#2a78d6"; }
    function categoryIcon(id) { const category = categoryById(id); return category ? category.icon : "N"; }
    function nodeHeight(node) { return Math.max(NODE_HEIGHT, 82 + Math.max(node.ports.inputs.length, node.ports.outputs.length) * 20); }
    function uniqueId(prefix, existing) {
      let index = 1;
      let candidate = `${prefix}-${index}`;
      while (existing.has(candidate)) { index += 1; candidate = `${prefix}-${index}`; }
      return candidate;
    }

    function designSnapshot() {
      return { artifact_title: state.model.artifact.title, graph: deepClone(state.model.graph) };
    }
    function restoreDesign(snapshot) {
      state.model.artifact.title = snapshot.artifact_title;
      state.model.graph = snapshot.graph;
    }
    function invalidateObservedRuns(reason = "observed_graph_changed") {
      let changed = false;
      state.model.runtime.observed_runs = state.model.runtime.observed_runs.map(run => {
        if (run.kind !== "observed" || !run.verification || run.verification.status !== "verified") return run;
        changed = true;
        return { ...run, kind: "unverified", claimed_kind: "observed", verification: { ...run.verification, status: "unverified" } };
      });
      if (!changed) return false;
      state.observedRunId = null;
      if (state.mode === "trace") state.mode = "design";
      diagnostic("observed_verification_failed", "warn", { error_code: reason });
      return true;
    }
    function pushHistory() {
      state.history.push(designSnapshot());
      if (state.history.length > HISTORY_LIMIT) state.history.shift();
      state.future = [];
      updateHistoryButtons();
    }
    function mutate(action, eventName, fields = {}) {
      pushHistory();
      action();
      invalidateObservedRuns();
      state.issues = validateGraph();
      diagnostic(eventName, "info", fields);
      renderAll();
    }
    function mutateLive(action, eventName, fields = {}) {
      pushHistory();
      action();
      invalidateObservedRuns();
      state.issues = validateGraph();
      diagnostic(eventName, "info", fields);
      renderToolbar();
      renderNodes();
      renderEdges();
      renderMinimap();
      renderBottom();
      updateHistoryButtons();
    }
    function undo() {
      if (!state.history.length) return;
      state.future.push(designSnapshot());
      restoreDesign(state.history.pop());
      invalidateObservedRuns();
      state.selected = null;
      state.issues = validateGraph();
      diagnostic("history_undo");
      renderAll();
    }
    function redo() {
      if (!state.future.length) return;
      state.history.push(designSnapshot());
      restoreDesign(state.future.pop());
      invalidateObservedRuns();
      state.selected = null;
      state.issues = validateGraph();
      diagnostic("history_redo");
      renderAll();
    }
    function updateHistoryButtons() {
      dom.undoButton.disabled = state.history.length === 0;
      dom.redoButton.disabled = state.future.length === 0;
    }

    function validateGraph(model = state.model) {
      const issues = [];
      const graph = model.graph;
      const nodeIds = new Set();
      const edgeIds = new Set();
      const schemaIds = new Set();
      const typeIds = new Set();
      const categoryIds = new Set();
      const nodesById = new Map();
      if (!MODES.has(graph.metadata.mode)) issues.push(issue("error", "invalid_graph_mode", `Unsupported graph mode: ${graph.metadata.mode}`, "graph", model.artifact.id));
      for (const schema of graph.schemas) {
        if (schemaIds.has(schema.id)) issues.push(issue("error", "duplicate_schema_id", `Duplicate schema ID: ${schema.id}`, "graph", model.artifact.id));
        schemaIds.add(schema.id);
      }
      for (const category of model.catalog.categories) {
        if (categoryIds.has(category.id)) issues.push(issue("error", "duplicate_category_id", `Duplicate category ID: ${category.id}`, "graph", model.artifact.id));
        categoryIds.add(category.id);
      }
      for (const type of model.catalog.node_types) {
        if (typeIds.has(type.type)) issues.push(issue("error", "duplicate_node_type", `Duplicate node type: ${type.type}`, "graph", model.artifact.id));
        typeIds.add(type.type);
        if (!categoryIds.has(type.category)) issues.push(issue("error", "unknown_type_category", `${type.label} uses an unknown category.`, "graph", model.artifact.id));
        const local = new Set();
        for (const direction of ["inputs", "outputs"]) {
          for (const port of type.ports[direction]) {
            if (local.has(port.id)) issues.push(issue("error", "duplicate_type_port_id", `${type.label} has duplicate port ID ${port.id}.`, "graph", model.artifact.id));
            local.add(port.id);
            if (port.schema !== "any" && !schemaIds.has(port.schema)) issues.push(issue("error", "unknown_type_schema", `${type.label}.${port.label} references unknown schema ${port.schema}.`, "graph", model.artifact.id));
          }
        }
      }
      for (const node of graph.nodes) {
        if (nodeIds.has(node.id)) issues.push(issue("error", "duplicate_node_id", `Duplicate node ID: ${node.id}`, "node", node.id));
        nodeIds.add(node.id);
        if (!nodesById.has(node.id)) nodesById.set(node.id, node);
        if (!typeIds.has(node.type)) issues.push(issue("error", "unknown_node_type", `${node.label} uses an unknown node type.`, "node", node.id));
        if (!categoryIds.has(node.category)) issues.push(issue("error", "unknown_category", `${node.label} uses an unknown category.`, "node", node.id));
        if (!NODE_STATUSES.has(node.status)) issues.push(issue("error", "invalid_node_status", `${node.label} has an invalid status.`, "node", node.id));
        const local = new Set();
        for (const direction of ["inputs", "outputs"]) {
          for (const port of node.ports[direction]) {
            if (local.has(port.id)) issues.push(issue("error", "duplicate_port_id", `${node.label} has duplicate port ID ${port.id}.`, "node", node.id));
            local.add(port.id);
            if (port.schema !== "any" && !schemaIds.has(port.schema)) issues.push(issue("error", "unknown_schema", `${node.label}.${port.label} references unknown schema ${port.schema}.`, "node", node.id));
          }
        }
      }
      const incoming = new Map();
      const connectionKeys = new Set();
      for (const edge of graph.edges) {
        if (edgeIds.has(edge.id)) issues.push(issue("error", "duplicate_edge_id", `Duplicate edge ID: ${edge.id}`, "edge", edge.id));
        edgeIds.add(edge.id);
        if (!EDGE_KINDS.has(edge.kind)) issues.push(issue("error", "invalid_edge_kind", `${edge.id} has an invalid edge kind.`, "edge", edge.id));
        const sourceNode = nodesById.get(edge.source.node);
        const targetNode = nodesById.get(edge.target.node);
        const sourcePort = sourceNode ? sourceNode.ports.outputs.find(port => port.id === edge.source.port) : null;
        const targetPort = targetNode ? targetNode.ports.inputs.find(port => port.id === edge.target.port) : null;
        if (!sourceNode || !targetNode) {
          issues.push(issue("error", "missing_edge_node", `${edge.id} references a missing node.`, "edge", edge.id));
          continue;
        }
        if (!sourcePort || !targetPort) {
          issues.push(issue("error", "missing_edge_port", `${edge.id} references a missing or wrong-direction port.`, "edge", edge.id));
          continue;
        }
        const key = `${edge.source.node}:${edge.source.port}>${edge.target.node}:${edge.target.port}`;
        if (connectionKeys.has(key)) issues.push(issue("error", "duplicate_connection", `${edge.id} duplicates an existing connection.`, "edge", edge.id));
        connectionKeys.add(key);
        if (edge.source.node === edge.target.node) issues.push(issue("error", "self_connection", `${edge.id} connects a node to itself.`, "edge", edge.id));
        const targetKey = `${edge.target.node}:${edge.target.port}`;
        incoming.set(targetKey, (incoming.get(targetKey) || 0) + 1);
        if (sourcePort.schema !== "any" && targetPort.schema !== "any" && sourcePort.schema !== targetPort.schema) issues.push(issue("error", "schema_mismatch", `${sourceNode.label}.${sourcePort.label} (${sourcePort.schema}) cannot connect to ${targetNode.label}.${targetPort.label} (${targetPort.schema}).`, "edge", edge.id));
      }
      for (const node of graph.nodes) {
        for (const port of node.ports.inputs) {
          const count = incoming.get(`${node.id}:${port.id}`) || 0;
          if (port.required && count === 0) issues.push(issue("error", "required_input_unconnected", `${node.label}.${port.label} is required but has no incoming edge.`, "node", node.id));
          if (!port.multiple && count > 1) issues.push(issue("error", "input_multiplicity", `${node.label}.${port.label} accepts one incoming edge but has ${count}.`, "node", node.id));
        }
      }
      if (model === state.model) dom.validationCount.textContent = String(issues.length);
      diagnostic("validation_completed", issues.some(item => item.severity === "error") ? "warn" : "info", { count: issues.length });
      return issues;
    }

    function issue(severity, code, message, kind, id) {
      return { id: `${code}:${id}`, severity, code, message, entity: { kind, id } };
    }

    function create(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }
    function svg(tag, attributes = {}) {
      const node = document.createElementNS(SVG_NS, tag);
      for (const [key, value] of Object.entries(attributes)) {
        const normalized = String(value);
        if (key === "d") node.setAttribute("d", normalized);
        else if (key === "class") node.setAttribute("class", normalized);
        else if (key === "data-edge-id") node.setAttribute("data-edge-id", normalized);
        else if (key === "tabindex") node.setAttribute("tabindex", normalized);
        else if (key === "role") node.setAttribute("role", normalized);
        else if (key === "aria-label") node.setAttribute("aria-label", normalized);
        else if (key === "transform") node.setAttribute("transform", normalized);
        else if (key === "width") node.setAttribute("width", normalized);
        else if (key === "height") node.setAttribute("height", normalized);
        else if (key === "x") node.setAttribute("x", normalized);
        else if (key === "y") node.setAttribute("y", normalized);
        else if (key === "text-anchor") node.setAttribute("text-anchor", normalized);
        else throw new Error("unsupported_svg_attribute");
      }
      return node;
    }

    function renderAll() {
      if (state.rendering) return;
      state.rendering = true;
      const started = performance.now();
      diagnostic("render_started");
      try {
        applyView();
        renderToolbar();
        renderPalette();
        renderNodes();
        renderEdges();
        renderInspector();
        renderMinimap();
        renderBottom();
        updateHistoryButtons();
        diagnostic("render_completed", "info", { duration_ms: Math.round(performance.now() - started), count: state.model.graph.nodes.length });
      } catch (error) {
        diagnostic("render_failed", "error", { error_code: errorCode(error) });
        showToast("Rendering failed. Open Diagnostics for the safe error code.", "error");
      } finally {
        state.rendering = false;
      }
    }

    function renderToolbar() {
      dom.graphTitle.value = state.model.graph.metadata.name;
      dom.artifactVersion.textContent = `v${state.model.artifact.version}`;
      const observedAvailable = verifiedObservedRuns().length > 0;
      for (const button of dom.modeTabs.querySelectorAll("[data-mode]")) {
        const mode = button.dataset.mode;
        button.classList.toggle("active", state.mode === mode);
        if (mode === "trace") button.disabled = !observedAvailable;
      }
      const bannerText = {
        design: ["Design mode", "Edit workflow structure"],
        contracts: ["Contracts", "Inspect typed port compatibility"],
        preview: ["Synthetic preview", "Generated locally; no nodes execute"],
        trace: ["Observed trace", observedAvailable ? observedRunLabel() : "No observed run supplied"],
        docs: ["Documentation", "Inspect provenance and source notes"]
      }[state.mode];
      dom.banner.replaceChildren();
      dom.banner.append(create("span", "banner-dot"), create("strong", "", bannerText[0]), create("span", "", bannerText[1]));
    }

    function renderPalette() {
      const query = dom.paletteSearch.value.trim().toLowerCase();
      const fragment = document.createDocumentFragment();
      let matched = 0;
      for (const category of state.model.catalog.categories) {
        const types = state.model.catalog.node_types.filter(type => type.category === category.id && (!query || `${type.label} ${type.type} ${type.description} ${category.label}`.toLowerCase().includes(query)));
        if (!types.length) continue;
        matched += types.length;
        const group = create("section", "palette-group");
        const button = create("button", "group-button");
        button.type = "button";
        button.style.setProperty("--category-color", category.color);
        const collapsed = state.collapsedGroups.has(category.id) && !query;
        button.append(create("span", "group-caret", collapsed ? ">" : "v"), create("span", "group-dot"), create("span", "", category.label), create("span", "group-count", String(types.length)));
        button.addEventListener("click", () => {
          if (state.collapsedGroups.has(category.id)) state.collapsedGroups.delete(category.id); else state.collapsedGroups.add(category.id);
          renderPalette();
        });
        group.append(button);
        if (!collapsed) {
          for (const type of types) {
            const item = create("div", "palette-item");
            item.draggable = true;
            item.tabIndex = 0;
            item.setAttribute("role", "button");
            item.setAttribute("aria-label", `Add ${type.label}`);
            item.style.setProperty("--category-color", category.color);
            const icon = create("span", "type-icon", category.icon);
            const text = create("span");
            text.append(create("div", "palette-label", type.label), create("div", "palette-type", type.type));
            item.append(icon, text, create("span", "palette-badge", type.badge));
            item.addEventListener("dragstart", event => {
              event.dataTransfer.effectAllowed = "copy";
              event.dataTransfer.setData("application/x-workflow-node-type", type.type);
            });
            item.addEventListener("keydown", event => {
              if (event.key === "Enter" || event.key === " ") {
                event.preventDefault();
                const rect = dom.canvas.getBoundingClientRect();
                addNodeFromType(type.type, screenToWorld(rect.left + rect.width / 2, rect.top + rect.height / 2));
              }
            });
            group.append(item);
          }
        }
        fragment.append(group);
      }
      if (!matched) fragment.append(create("div", "palette-empty", "No node types match this search."));
      dom.palette.replaceChildren(fragment);
    }

    function activeRunStatuses() {
      if (state.mode === "preview") return state.preview.statuses;
      if (state.mode === "trace") {
        const run = observedRun();
        return new Map((run ? run.steps : []).map(step => [step.node_id, step.status]));
      }
      return new Map();
    }

    function renderNodes() {
      const fragment = document.createDocumentFragment();
      const selectedNode = state.selected && state.selected.kind === "node" ? state.selected.id : null;
      const related = new Set();
      if (selectedNode) {
        for (const edge of state.model.graph.edges) {
          if (edge.source.node === selectedNode) related.add(edge.target.node);
          if (edge.target.node === selectedNode) related.add(edge.source.node);
        }
      }
      const statuses = activeRunStatuses();
      for (const node of state.model.graph.nodes) {
        const category = categoryById(node.category) || { color: "#2a78d6", icon: "N" };
        const card = create("article", "node");
        card.dataset.nodeId = node.id;
        card.tabIndex = 0;
        card.setAttribute("role", "button");
        card.setAttribute("aria-label", `Select node ${node.label}`);
        card.style.transform = `translate(${node.position.x}px, ${node.position.y}px)`;
        card.style.height = `${nodeHeight(node)}px`;
        card.style.setProperty("--category-color", category.color);
        const runtimeStatus = statuses.get(node.id);
        if (node.id === selectedNode) card.classList.add("selected");
        else if (selectedNode && related.has(node.id)) card.classList.add("related");
        else if (selectedNode) card.classList.add("dimmed");
        if (runtimeStatus) card.classList.add(runtimeStatus);

        const head = create("div", "node-head");
        const icon = create("span", "type-icon", category.icon);
        icon.style.setProperty("--category-color", category.color);
        const titleWrap = create("div");
        titleWrap.append(create("div", "node-title", node.label), create("div", "node-type", node.type));
        const status = create("span", "status-chip");
        const shownStatus = runtimeStatus || node.status;
        status.append(create("span", `status-dot ${shownStatus}`), create("span", "", shownStatus));
        head.append(icon, titleWrap, status);
        head.addEventListener("pointerdown", event => startNodeDrag(event, node));
        card.addEventListener("pointerdown", event => {
          if (event.button !== 0 || event.target.closest(".port")) return;
          selectEntity("node", node.id);
        });
        card.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            event.stopPropagation();
            selectEntity("node", node.id);
          }
        });

        const description = create("div", "node-description", node.description || "No description.");
        const meta = create("div", "node-meta");
        meta.append(create("span", "meta-pill", node.owner), create("span", "meta-pill mono", node.metadata.fact_status));
        const step = runtimeStep(node.id);
        if (step) meta.append(create("span", "meta-pill latency-pill", `${step.duration_ms}ms`));
        card.append(head, description, meta);

        addPorts(card, node, "input");
        addPorts(card, node, "output");
        fragment.append(card);
      }
      dom.nodes.replaceChildren(fragment);
    }

    function addPorts(card, node, direction) {
      const list = direction === "input" ? node.ports.inputs : node.ports.outputs;
      list.forEach((port, index) => {
        const row = create("div", `port ${direction}`);
        row.style.setProperty("--port-y", `${54 + index * 20}px`);
        row.dataset.nodeId = node.id;
        row.dataset.portId = port.id;
        row.dataset.direction = direction;
        row.tabIndex = 0;
        row.setAttribute("role", "button");
        row.setAttribute("aria-label", `${direction} port ${port.label}, schema ${port.schema}`);
        row.title = `${port.label}: ${port.schema}`;
        row.append(create("span", "port-dot"), create("span", "port-label", port.label));
        row.addEventListener("pointerdown", event => {
          event.stopPropagation();
          if (direction === "output") startConnection(event, node, port);
          else showToast("Connections start from an output port.", "error");
        });
        row.addEventListener("keydown", event => {
          if (event.key !== "Enter" && event.key !== " ") return;
          event.preventDefault();
          event.stopPropagation();
          if (direction === "output") startKeyboardConnection(node, port);
          else finishKeyboardConnection(node, port);
        });
        card.append(row);
      });
    }

    function portPoint(nodeId, portId, direction) {
      const node = nodeById(nodeId);
      if (!node) return { x: 0, y: 0 };
      const list = direction === "input" ? node.ports.inputs : node.ports.outputs;
      const index = Math.max(0, list.findIndex(port => port.id === portId));
      return { x: node.position.x + (direction === "output" ? NODE_WIDTH : 0), y: node.position.y + 62 + index * 20 };
    }

    function edgePath(source, target) {
      const distance = Math.max(48, Math.abs(target.x - source.x) * .46);
      return `M ${source.x} ${source.y} C ${source.x + distance} ${source.y}, ${target.x - distance} ${target.y}, ${target.x} ${target.y}`;
    }

    function renderEdges() {
      const defs = dom.edges.querySelector("defs");
      const fragment = document.createDocumentFragment();
      const selectedEdge = state.selected && state.selected.kind === "edge" ? state.selected.id : null;
      for (const edge of state.model.graph.edges) {
        const source = portPoint(edge.source.node, edge.source.port, "output");
        const target = portPoint(edge.target.node, edge.target.port, "input");
        const d = edgePath(source, target);
        const visible = svg("path", { d, class: `edge-visible ${edge.kind}${selectedEdge === edge.id ? " selected" : ""}`, "data-edge-id": edge.id });
        const hit = svg("path", { d, class: "edge-hit", tabindex: "0", role: "button", "aria-label": `Select edge ${edge.label || edge.id}`, "data-edge-id": edge.id });
        hit.addEventListener("click", event => { event.stopPropagation(); selectEntity("edge", edge.id); });
        hit.addEventListener("keydown", event => { if (event.key === "Enter" || event.key === " ") selectEntity("edge", edge.id); });
        fragment.append(visible, hit);
        if (edge.label) {
          const mid = { x: (source.x + target.x) / 2, y: (source.y + target.y) / 2 };
          const group = svg("g", { class: "edge-label", transform: `translate(${mid.x - 26} ${mid.y - 10})`, "data-edge-id": edge.id });
          group.append(svg("rect", { width: 52, height: 18 }), svg("text", { x: 26, y: 12, "text-anchor": "middle" }));
          group.lastChild.textContent = edge.label;
          fragment.append(group);
        }
      }
      if (state.connection) {
        const draft = svg("path", { class: "draft-edge", d: edgePath(state.connection.sourcePoint, state.connection.pointerPoint) });
        fragment.append(draft);
      }
      dom.edges.replaceChildren(defs, fragment);
    }

    function elementsForEdge(edgeId) {
      return Array.from(dom.edges.querySelectorAll("[data-edge-id]")).filter(element => element.dataset.edgeId === edgeId);
    }

    function updateEdgeGeometry(edge) {
      const source = portPoint(edge.source.node, edge.source.port, "output");
      const target = portPoint(edge.target.node, edge.target.port, "input");
      const d = edgePath(source, target);
      const mid = { x: (source.x + target.x) / 2, y: (source.y + target.y) / 2 };
      for (const element of elementsForEdge(edge.id)) {
        if (element.tagName.toLowerCase() === "path") element.setAttribute("d", d);
        else if (element.classList.contains("edge-label")) element.setAttribute("transform", `translate(${mid.x - 26} ${mid.y - 10})`);
      }
    }

    function updateConnectedEdges(nodeId) {
      for (const edge of state.model.graph.edges) {
        if (edge.source.node === nodeId || edge.target.node === nodeId) updateEdgeGeometry(edge);
      }
    }

    function updateNodeGeometry(node) {
      const card = Array.from(dom.nodes.children).find(element => element.dataset.nodeId === node.id);
      if (card) card.style.transform = `translate(${node.position.x}px, ${node.position.y}px)`;
    }

    function updateDraftEdge() {
      const draft = dom.edges.querySelector(".draft-edge");
      if (draft && state.connection) draft.setAttribute("d", edgePath(state.connection.sourcePoint, state.connection.pointerPoint));
    }

    function renderInspector() {
      const content = create("div", "inspector-content");
      if (!state.selected) {
        dom.inspectorHeading.textContent = "Inspector";
        const empty = create("div", "empty-state");
        empty.append(create("div", "type-icon", "i"), create("strong", "", "Nothing selected"), create("span", "", "Click a node or edge to edit its configuration."));
        dom.inspector.replaceChildren(empty);
        return;
      }
      if (state.selected.kind === "node") renderNodeInspector(content, nodeById(state.selected.id));
      else renderEdgeInspector(content, edgeById(state.selected.id));
      dom.inspector.replaceChildren(content);
    }

    function field(labelText, value, onChange, options = {}) {
      const wrap = create("div", "field");
      const label = create("label", "", labelText);
      const control = options.multiline ? document.createElement("textarea") : options.choices ? document.createElement("select") : document.createElement("input");
      control.id = `inspector-field-${++fieldSequence}`;
      label.htmlFor = control.id;
      if (options.choices) {
        for (const choice of options.choices) {
          const option = document.createElement("option");
          option.value = choice;
          option.textContent = choice;
          control.append(option);
        }
      }
      control.value = value == null ? "" : String(value);
      if (options.mono) control.classList.add("mono-input");
      if (options.readonly) control.readOnly = true;
      if (!options.readonly) control.addEventListener(options.live ? "input" : "change", event => onChange(event.target.value));
      wrap.append(label, control);
      if (options.help) wrap.append(create("div", "help", options.help));
      return wrap;
    }

    function renderNodeInspector(content, node) {
      if (!node) { state.selected = null; renderInspector(); return; }
      dom.inspectorHeading.textContent = "Node inspector";
      const identity = create("section", "form-section");
      identity.append(create("div", "section-title", "Identity"));
      identity.append(field("Label", node.label, value => mutateLive(() => { node.label = cleanString(value, node.label, 96); }, "node_updated", { node_id: node.id }), { live: true }));
      identity.append(field("Machine type", node.type, () => {}, { readonly: true, mono: true }));
      identity.append(field("Diagnostic ref", diagnosticToken("node_id", node.id), () => {}, { readonly: true, mono: true, help: "Session-local token used in sanitized diagnostics." }));
      identity.append(field("Description", node.description, value => mutate(() => { node.description = cleanString(value, "", 240); }, "node_updated", { node_id: node.id }), { multiline: true }));
      const row = create("div", "field-row");
      row.append(field("Owner", node.owner, value => mutate(() => { node.owner = cleanString(value, "unassigned", 48); }, "node_updated", { node_id: node.id })), field("Status", node.status, value => mutate(() => { node.status = NODE_STATUSES.has(value) ? value : "unknown"; }, "node_updated", { node_id: node.id }), { choices: Array.from(NODE_STATUSES) }));
      identity.append(row);

      const provenance = create("section", "form-section");
      provenance.append(create("div", "section-title", "Provenance"));
      const provenanceRow = create("div", "field-row");
      provenanceRow.append(field("Fact status", node.metadata.fact_status, value => mutate(() => {
        if (value === "observed" && !node.metadata.evidence.length) {
          node.metadata.fact_status = "inferred";
          showToast("Observed status requires source evidence. Kept as inferred.", "error");
        } else node.metadata.fact_status = value;
      }, "node_updated", { node_id: node.id }), { choices: ["observed", "inferred", "proposed", "unknown"] }), field("Confidence", node.metadata.confidence, value => mutate(() => { node.metadata.confidence = value; }, "node_updated", { node_id: node.id }), { choices: ["high", "medium", "low"] }));
      provenance.append(provenanceRow, create("div", "help", node.metadata.evidence.length ? `${node.metadata.evidence.length} evidence reference(s)` : "No source evidence attached to this fabricated example."));

      const ports = create("section", "form-section");
      ports.append(create("div", "section-title", "Typed ports"));
      ports.append(renderPortEditor(node, "input"), renderPortEditor(node, "output"));
      const portActions = create("div", "inspector-actions");
      const addInput = create("button", "small-button", "Add input");
      const addOutput = create("button", "small-button", "Add output");
      addInput.type = addOutput.type = "button";
      addInput.addEventListener("click", () => addPort(node, "input"));
      addOutput.addEventListener("click", () => addPort(node, "output"));
      portActions.append(addInput, addOutput);
      ports.append(portActions);

      const actions = create("section", "form-section");
      actions.append(create("div", "section-title", "Actions"));
      const actionRow = create("div", "inspector-actions");
      const duplicate = create("button", "small-button", "Duplicate");
      const remove = create("button", "small-button danger", "Delete node");
      duplicate.type = remove.type = "button";
      duplicate.addEventListener("click", () => duplicateNode(node));
      remove.addEventListener("click", () => deleteSelected());
      actionRow.append(duplicate, remove);
      actions.append(actionRow);
      content.append(identity, provenance, ports, actions);
    }

    function renderPortEditor(node, direction) {
      const wrap = create("div", "port-editor");
      const heading = create("div", "help", direction === "input" ? "Inputs" : "Outputs");
      wrap.append(heading);
      const list = direction === "input" ? node.ports.inputs : node.ports.outputs;
      if (!list.length) wrap.append(create("div", "help", `No ${direction} ports.`));
      list.forEach(port => {
        const row = create("div", `port-editor-row ${direction}`);
        row.append(create("span", "port-direction", direction === "input" ? "IN" : "OUT"));
        const label = document.createElement("input");
        label.value = port.label;
        label.setAttribute("aria-label", `${direction} port label`);
        const schema = document.createElement("input");
        schema.value = port.schema;
        schema.setAttribute("aria-label", `${direction} port schema`);
        label.addEventListener("change", event => mutate(() => { port.label = cleanString(event.target.value, port.label, 48); }, "node_updated", { node_id: node.id, port_id: port.id }));
        schema.addEventListener("change", event => mutate(() => { port.schema = safeId(event.target.value) || "any"; }, "node_updated", { node_id: node.id, port_id: port.id }));
        const flags = create("span", "port-flags");
        for (const [key, text] of [["required", "req"], ["multiple", "multi"]]) {
          const flag = create("label", "port-flag");
          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = port[key];
          checkbox.setAttribute("aria-label", `${direction} port ${key}`);
          checkbox.addEventListener("change", event => mutate(() => { port[key] = event.target.checked; }, "node_updated", { node_id: node.id, port_id: port.id }));
          flag.append(checkbox, document.createTextNode(text));
          flags.append(flag);
        }
        const remove = create("button", "remove-port", "x");
        remove.type = "button";
        remove.setAttribute("aria-label", `Remove ${port.label} port`);
        remove.addEventListener("click", () => removePort(node, direction, port.id));
        row.append(label, schema, flags, remove);
        wrap.append(row);
      });
      return wrap;
    }

    function renderEdgeInspector(content, edge) {
      if (!edge) { state.selected = null; renderInspector(); return; }
      dom.inspectorHeading.textContent = "Edge inspector";
      const sourceNode = nodeById(edge.source.node);
      const targetNode = nodeById(edge.target.node);
      const identity = create("section", "form-section");
      identity.append(create("div", "section-title", "Connection"));
      identity.append(field("Edge ID", edge.id, () => {}, { readonly: true, mono: true }));
      identity.append(field("Diagnostic ref", diagnosticToken("edge_id", edge.id), () => {}, { readonly: true, mono: true, help: "Session-local token used in sanitized diagnostics." }));
      identity.append(field("Label", edge.label, value => mutateLive(() => { edge.label = cleanString(value, "", 48); }, "edge_updated", { edge_id: edge.id }), { live: true }));
      identity.append(field("Kind", edge.kind, value => mutate(() => { edge.kind = EDGE_KINDS.has(value) ? value : "data"; }, "edge_updated", { edge_id: edge.id }), { choices: Array.from(EDGE_KINDS) }));
      const route = create("section", "form-section");
      route.append(create("div", "section-title", "Route"), create("div", "help", `${sourceNode ? sourceNode.label : edge.source.node}.${edge.source.port}`), create("div", "help", `to ${targetNode ? targetNode.label : edge.target.node}.${edge.target.port}`));
      const actions = create("section", "form-section");
      actions.append(create("div", "section-title", "Actions"));
      const remove = create("button", "small-button danger", "Delete edge");
      remove.type = "button";
      remove.addEventListener("click", deleteSelected);
      actions.append(remove);
      content.append(identity, route, actions);
    }

    function renderMinimap() {
      const title = dom.minimap.querySelector(".minimap-title") || create("span", "minimap-title", "MAP");
      const fragment = document.createDocumentFragment();
      fragment.append(title);
      const bounds = graphBounds(80);
      const width = Math.max(1, bounds.maxX - bounds.minX);
      const height = Math.max(1, bounds.maxY - bounds.minY);
      const scale = Math.min(130 / width, 70 / height);
      for (const node of state.model.graph.nodes) {
        const mini = create("div", "mini-node");
        mini.style.setProperty("--category-color", categoryColor(node.category));
        mini.style.left = `${10 + (node.position.x - bounds.minX) * scale}px`;
        mini.style.top = `${15 + (node.position.y - bounds.minY) * scale}px`;
        mini.style.width = `${Math.max(7, NODE_WIDTH * scale)}px`;
        mini.style.height = `${Math.max(5, nodeHeight(node) * scale)}px`;
        fragment.append(mini);
      }
      const canvasRect = dom.canvas.getBoundingClientRect();
      const viewLeft = -state.view.x / state.view.scale;
      const viewTop = -state.view.y / state.view.scale;
      const viewport = create("div", "mini-viewport");
      viewport.style.left = `${10 + (viewLeft - bounds.minX) * scale}px`;
      viewport.style.top = `${15 + (viewTop - bounds.minY) * scale}px`;
      viewport.style.width = `${Math.max(8, canvasRect.width / state.view.scale * scale)}px`;
      viewport.style.height = `${Math.max(8, canvasRect.height / state.view.scale * scale)}px`;
      fragment.append(viewport);
      dom.minimap.replaceChildren(fragment);
    }

    function renderBottom() {
      dom.bottomPanel.classList.toggle("collapsed", state.bottomCollapsed);
      dom.app.classList.toggle("bottom-collapsed", state.bottomCollapsed);
      for (const button of dom.bottomTabs.querySelectorAll("[data-tab]")) {
        const active = button.dataset.tab === state.bottomTab;
        button.classList.toggle("active", active);
        button.setAttribute("aria-selected", String(active));
        button.tabIndex = active ? 0 : -1;
      }
      dom.bottomContent.setAttribute("aria-labelledby", `tab-${state.bottomTab}`);
      dom.validationCount.textContent = String(state.issues.length);
      dom.previewCount.textContent = String(state.preview.logs.length);
      dom.diagnosticCount.textContent = String(state.diagnostics.length);
      if (state.bottomCollapsed) { dom.bottomContent.replaceChildren(); return; }
      if (state.bottomTab === "validation") renderValidationBottom();
      else if (state.bottomTab === "preview") renderPreviewBottom();
      else if (state.bottomTab === "diagnostics") renderDiagnosticsBottom();
      else renderJsonBottom();
    }

    function renderValidationBottom() {
      if (!state.issues.length) {
        dom.bottomContent.replaceChildren(create("div", "bottom-empty", "No validation issues. The graph contract is internally consistent."));
        return;
      }
      const list = create("div", "issue-list");
      for (const item of state.issues) {
        const row = create("div", "issue-row");
        row.tabIndex = 0;
        row.append(create("span", `severity ${item.severity}`, item.severity), create("span", "row-muted", item.code), create("span", "", item.message));
        row.addEventListener("click", () => focusIssue(item));
        row.addEventListener("keydown", event => { if (event.key === "Enter") focusIssue(item); });
        list.append(row);
      }
      dom.bottomContent.replaceChildren(list);
    }

    function renderPreviewBottom() {
      const fragment = document.createDocumentFragment();
      if (!state.preview.logs.length) {
        fragment.append(create("div", "bottom-empty", "No synthetic preview has run. Preview data is generated locally and never executes workflow nodes."));
      } else {
        const list = create("div", "log-list");
        for (const log of state.preview.logs) {
          const row = create("div", "log-row");
          row.append(create("span", "row-muted", `+${String(log.offset_ms).padStart(4, "0")}ms`), create("span", "severity info", "SYNTH"), create("span", "row-muted", log.node_id), create("span", "", log.message));
          list.append(row);
        }
        fragment.append(list);
      }
      dom.bottomContent.replaceChildren(fragment);
    }

    function renderDiagnosticsBottom() {
      const fragment = document.createDocumentFragment();
      const toolbar = create("div", "bottom-toolbar");
      const clear = create("button", "small-button", "Clear diagnostics");
      const exportButton = create("button", "small-button", "Export sanitized JSON");
      clear.type = exportButton.type = "button";
      clear.addEventListener("click", () => { state.diagnostics = []; renderBottom(); });
      exportButton.addEventListener("click", exportDiagnostics);
      toolbar.append(clear, exportButton);
      fragment.append(toolbar);
      if (!state.diagnostics.length) fragment.append(create("div", "bottom-empty", "No diagnostic events."));
      else {
        const list = create("div", "diagnostic-list");
        for (const record of state.diagnostics.slice().reverse()) {
          const details = Object.entries(record).filter(([key]) => !["ts", "level", "event"].includes(key)).map(([key, value]) => `${key}=${value}`).join(" ");
          const row = create("div", "diagnostic-row");
          row.append(create("span", "row-muted", record.ts.slice(11, 23)), create("span", `diagnostic-level ${record.level}`, record.level.toUpperCase()), create("span", "", record.event), create("span", "row-muted", details));
          list.append(row);
        }
        fragment.append(list);
      }
      dom.bottomContent.replaceChildren(fragment);
    }

    function renderJsonBottom() {
      const pre = create("pre", "json-view", JSON.stringify(exportableModel(), null, 2));
      dom.bottomContent.replaceChildren(pre);
    }

    function selectEntity(kind, id) {
      state.selected = { kind, id };
      diagnostic("selection_changed", "info", kind === "node" ? { node_id: id } : { edge_id: id });
      renderNodes();
      renderEdges();
      renderInspector();
    }

    function focusIssue(item) {
      if (item.entity.kind === "graph") {
        state.selected = null;
        renderNodes();
        renderEdges();
        renderInspector();
        showToast("This issue applies to the graph model rather than a single canvas entity.");
        return;
      }
      selectEntity(item.entity.kind, item.entity.id);
      if (item.entity.kind === "node") centerNode(item.entity.id);
    }

    function applyView() {
      dom.world.style.transform = `translate(${state.view.x}px, ${state.view.y}px) scale(${state.view.scale})`;
      dom.zoomReadout.textContent = `${Math.round(state.view.scale * 100)}%`;
    }

    function screenToWorld(clientX, clientY) {
      const rect = dom.canvas.getBoundingClientRect();
      return { x: (clientX - rect.left - state.view.x) / state.view.scale, y: (clientY - rect.top - state.view.y) / state.view.scale };
    }

    function setZoom(nextScale, anchorX, anchorY) {
      const rect = dom.canvas.getBoundingClientRect();
      const screenX = anchorX == null ? rect.left + rect.width / 2 : anchorX;
      const screenY = anchorY == null ? rect.top + rect.height / 2 : anchorY;
      const before = screenToWorld(screenX, screenY);
      state.view.scale = clamp(nextScale, .35, 2);
      state.view.x = screenX - rect.left - before.x * state.view.scale;
      state.view.y = screenY - rect.top - before.y * state.view.scale;
      applyView();
      renderMinimap();
    }

    function graphBounds(padding = 0) {
      if (!state.model.graph.nodes.length) return { minX: 0, minY: 0, maxX: 1000, maxY: 700 };
      return {
        minX: Math.min(...state.model.graph.nodes.map(node => node.position.x)) - padding,
        minY: Math.min(...state.model.graph.nodes.map(node => node.position.y)) - padding,
        maxX: Math.max(...state.model.graph.nodes.map(node => node.position.x + NODE_WIDTH)) + padding,
        maxY: Math.max(...state.model.graph.nodes.map(node => node.position.y + nodeHeight(node))) + padding
      };
    }

    function fitView() {
      const rect = dom.canvas.getBoundingClientRect();
      const bounds = graphBounds(72);
      const width = Math.max(1, bounds.maxX - bounds.minX);
      const height = Math.max(1, bounds.maxY - bounds.minY);
      state.view.scale = clamp(Math.min(rect.width / width, rect.height / height), .35, 1.35);
      state.view.x = (rect.width - width * state.view.scale) / 2 - bounds.minX * state.view.scale;
      state.view.y = (rect.height - height * state.view.scale) / 2 - bounds.minY * state.view.scale;
      applyView();
      renderMinimap();
    }

    function centerNode(id) {
      const node = nodeById(id);
      if (!node) return;
      const rect = dom.canvas.getBoundingClientRect();
      state.view.x = rect.width / 2 - (node.position.x + NODE_WIDTH / 2) * state.view.scale;
      state.view.y = rect.height / 2 - (node.position.y + nodeHeight(node) / 2) * state.view.scale;
      applyView();
      renderMinimap();
    }

    function tryPointerCapture(element, pointerId) {
      if (!element || typeof element.setPointerCapture !== "function") return;
      try {
        element.setPointerCapture(pointerId);
      } catch (_error) {
        diagnostic("pointer_capture_failed", "warn", { error_code: "invalid_pointer_state" });
      }
    }

    function startNodeDrag(event, node) {
      if (event.button !== 0) return;
      event.preventDefault();
      event.stopPropagation();
      const point = screenToWorld(event.clientX, event.clientY);
      tryPointerCapture(dom.canvas, event.pointerId);
      selectEntity("node", node.id);
      state.drag = { nodeId: node.id, offsetX: point.x - node.position.x, offsetY: point.y - node.position.y, moved: false };
    }

    function moveNodeDrag(event) {
      if (!state.drag) return;
      const node = nodeById(state.drag.nodeId);
      if (!node) return;
      const point = screenToWorld(event.clientX, event.clientY);
      const x = clamp(snap(point.x - state.drag.offsetX), 0, WORLD_WIDTH - NODE_WIDTH);
      const y = clamp(snap(point.y - state.drag.offsetY), 0, WORLD_HEIGHT - nodeHeight(node));
      if (x === node.position.x && y === node.position.y) return;
      if (!state.drag.moved) {
        pushHistory();
        state.drag.moved = true;
        if (invalidateObservedRuns()) renderToolbar();
      }
      node.position.x = x;
      node.position.y = y;
      updateNodeGeometry(node);
      updateConnectedEdges(node.id);
    }

    function endNodeDrag() {
      if (!state.drag) return;
      if (state.drag.moved) diagnostic("node_moved", "info", { node_id: state.drag.nodeId });
      state.drag = null;
      renderMinimap();
    }

    function startConnection(event, node, port) {
      if (event.button !== 0) return;
      event.preventDefault();
      dom.canvas.classList.add("connecting");
      const sourcePoint = portPoint(node.id, port.id, "output");
      state.connection = { sourceNode: node.id, sourcePort: port.id, sourcePoint, pointerPoint: screenToWorld(event.clientX, event.clientY), keyboard: false };
      renderEdges();
    }

    function startKeyboardConnection(node, port) {
      const sourcePoint = portPoint(node.id, port.id, "output");
      state.connection = { sourceNode: node.id, sourcePort: port.id, sourcePoint, pointerPoint: { x: sourcePoint.x + 96, y: sourcePoint.y }, keyboard: true };
      dom.canvas.classList.add("connecting");
      renderEdges();
      showToast(`Connection started from ${port.label}. Focus an input port and press Enter.`);
    }

    function finishKeyboardConnection(node, port) {
      if (!state.connection || !state.connection.keyboard) {
        showToast("Choose an output port first.", "error");
        return;
      }
      const connection = state.connection;
      state.connection = null;
      dom.canvas.classList.remove("connecting");
      connectPorts(connection.sourceNode, connection.sourcePort, node.id, port.id);
    }

    function moveConnection(event) {
      if (!state.connection || state.connection.keyboard) return;
      state.connection.pointerPoint = screenToWorld(event.clientX, event.clientY);
      updateDraftEdge();
    }

    function endConnection(event) {
      if (!state.connection || state.connection.keyboard) return;
      const targetElement = document.elementFromPoint(event.clientX, event.clientY);
      const portElement = targetElement && targetElement.closest ? targetElement.closest(".port") : null;
      const connection = state.connection;
      state.connection = null;
      dom.canvas.classList.remove("connecting");
      if (!portElement || portElement.dataset.direction !== "input") {
        diagnostic("edge_rejected", "warn", { node_id: connection.sourceNode, port_id: connection.sourcePort, error_code: "missing_input_target" });
        showToast("Drop the connection on an input port.", "error");
        renderEdges();
        return;
      }
      connectPorts(connection.sourceNode, connection.sourcePort, portElement.dataset.nodeId, portElement.dataset.portId);
    }

    function connectPorts(sourceNodeId, sourcePortId, targetNodeId, targetPortId) {
      const sourcePort = portByRef(sourceNodeId, sourcePortId, "output");
      const targetPort = portByRef(targetNodeId, targetPortId, "input");
      const rejection = connectionRejection(sourceNodeId, sourcePortId, targetNodeId, targetPortId, sourcePort, targetPort);
      if (rejection) {
        diagnostic("edge_rejected", "warn", { node_id: targetNodeId, port_id: targetPortId, error_code: rejection.code });
        showToast(rejection.message, "error");
        renderEdges();
        return;
      }
      const existing = new Set(state.model.graph.edges.map(edge => edge.id));
      const edgeId = uniqueId("edge", existing);
      mutate(() => state.model.graph.edges.push({ id: edgeId, source: { node: sourceNodeId, port: sourcePortId }, target: { node: targetNodeId, port: targetPortId }, kind: "data", label: sourcePort.label, async: false }), "edge_connected", { edge_id: edgeId, node_id: targetNodeId, port_id: targetPortId });
      selectEntity("edge", edgeId);
      showToast("Connection created.", "success");
    }

    function connectionRejection(sourceNodeId, sourcePortId, targetNodeId, targetPortId, sourcePort, targetPort) {
      if (!sourcePort || !targetPort) return { code: "missing_port", message: "One of the selected ports no longer exists." };
      if (sourceNodeId === targetNodeId) return { code: "self_connection", message: "A node cannot connect to itself." };
      if (state.model.graph.edges.some(edge => edge.source.node === sourceNodeId && edge.source.port === sourcePortId && edge.target.node === targetNodeId && edge.target.port === targetPortId)) return { code: "duplicate_connection", message: "This exact connection already exists." };
      if (!targetPort.multiple && state.model.graph.edges.some(edge => edge.target.node === targetNodeId && edge.target.port === targetPortId)) return { code: "input_multiplicity", message: "This input accepts only one connection." };
      if (sourcePort.schema !== "any" && targetPort.schema !== "any" && sourcePort.schema !== targetPort.schema) return { code: "schema_mismatch", message: `Schema mismatch: ${sourcePort.schema} cannot connect to ${targetPort.schema}.` };
      return null;
    }

    function addNodeFromType(typeId, point) {
      const type = nodeTypeById(typeId);
      if (!type) { showToast("Unknown node type.", "error"); return; }
      const ids = new Set(state.model.graph.nodes.map(node => node.id));
      const id = uniqueId(`node-${safeId(type.label).toLowerCase() || "item"}`, ids);
      const node = {
        id,
        type: type.type,
        label: type.label,
        description: type.description,
        category: type.category,
        owner: type.owner,
        status: "draft",
        position: { x: clamp(snap(point.x - NODE_WIDTH / 2), 0, WORLD_WIDTH - NODE_WIDTH), y: clamp(snap(point.y - NODE_HEIGHT / 2), 0, WORLD_HEIGHT - NODE_HEIGHT) },
        ports: deepClone(type.ports),
        metadata: { confidence: "medium", fact_status: "proposed", evidence: [] }
      };
      node.position.y = clamp(node.position.y, 0, WORLD_HEIGHT - nodeHeight(node));
      mutate(() => state.model.graph.nodes.push(node), "node_created", { node_id: id });
      selectEntity("node", id);
    }

    function duplicateNode(node) {
      const ids = new Set(state.model.graph.nodes.map(item => item.id));
      const clone = deepClone(node);
      clone.id = uniqueId(`${node.id}-copy`, ids);
      clone.label = `${node.label} copy`.slice(0, 96);
      clone.position.x = clamp(node.position.x + 32, 0, WORLD_WIDTH - NODE_WIDTH);
      clone.position.y = clamp(node.position.y + 32, 0, WORLD_HEIGHT - nodeHeight(clone));
      mutate(() => state.model.graph.nodes.push(clone), "node_created", { node_id: clone.id });
      selectEntity("node", clone.id);
    }

    function addPort(node, direction) {
      const list = direction === "input" ? node.ports.inputs : node.ports.outputs;
      const ids = new Set(list.map(port => port.id));
      const id = uniqueId(direction, ids);
      mutate(() => list.push({ id, label: id, schema: "any", required: direction === "input", multiple: false }), "node_updated", { node_id: node.id, port_id: id });
      selectEntity("node", node.id);
    }

    function removePort(node, direction, portId) {
      mutate(() => {
        const list = direction === "input" ? node.ports.inputs : node.ports.outputs;
        const index = list.findIndex(port => port.id === portId);
        if (index >= 0) list.splice(index, 1);
        state.model.graph.edges = state.model.graph.edges.filter(edge => !(direction === "input" ? edge.target.node === node.id && edge.target.port === portId : edge.source.node === node.id && edge.source.port === portId));
      }, "node_updated", { node_id: node.id, port_id: portId });
      selectEntity("node", node.id);
    }

    function deleteSelected() {
      if (!state.selected) return;
      const selected = { ...state.selected };
      if (selected.kind === "node") {
        mutate(() => {
          state.model.graph.nodes = state.model.graph.nodes.filter(node => node.id !== selected.id);
          state.model.graph.edges = state.model.graph.edges.filter(edge => edge.source.node !== selected.id && edge.target.node !== selected.id);
          state.selected = null;
        }, "node_deleted", { node_id: selected.id });
      } else {
        mutate(() => { state.model.graph.edges = state.model.graph.edges.filter(edge => edge.id !== selected.id); state.selected = null; }, "edge_deleted", { edge_id: selected.id });
      }
    }

    function startPan(event) {
      if (event.button !== 0 || event.target.closest(".node") || event.target.closest(".edge-hit") || event.target.closest(".port")) return;
      dom.canvas.classList.add("panning");
      state.pan = { startX: event.clientX, startY: event.clientY, viewX: state.view.x, viewY: state.view.y };
      tryPointerCapture(dom.canvas, event.pointerId);
      state.selected = null;
      renderNodes();
      renderEdges();
      renderInspector();
    }

    function movePan(event) {
      if (!state.pan) return;
      state.view.x = state.pan.viewX + event.clientX - state.pan.startX;
      state.view.y = state.pan.viewY + event.clientY - state.pan.startY;
      applyView();
      renderMinimap();
    }

    function endPan() { state.pan = null; dom.canvas.classList.remove("panning"); }

    function runtimeStep(nodeId) {
      if (state.mode === "preview") return state.model.runtime.preview.steps.find(step => step.node_id === nodeId);
      if (state.mode === "trace") { const run = observedRun(); return run && run.steps.find(step => step.node_id === nodeId); }
      return null;
    }
    function observedRun() {
      const runs = verifiedObservedRuns();
      return runs.find(run => run.id === state.observedRunId) || runs[0] || null;
    }
    function observedRunLabel() { const run = observedRun(); return run ? `${run.label} · verified ${run.provenance.type}` : "No verified observed run supplied"; }

    function resetSyntheticPreview() {
      stopPreviewTimers();
      state.preview.startedAt = 0;
      state.preview.statuses = new Map();
      state.preview.logs = [];
    }

    function startSyntheticPreview() {
      resetSyntheticPreview();
      state.mode = "preview";
      state.preview.active = true;
      state.preview.startedAt = performance.now();
      state.bottomTab = "preview";
      const steps = state.model.runtime.preview.steps;
      const total = Math.max(0, ...steps.map(step => step.offset_ms + step.duration_ms));
      const playbackScale = total > 5000 ? 5000 / total : 1;
      state.preview.events = steps.flatMap(step => [
        { at_ms: step.offset_ms, kind: "start", step },
        { at_ms: step.offset_ms + step.duration_ms, kind: "end", step }
      ]).sort((left, right) => left.at_ms - right.at_ms || (left.kind === right.kind ? 0 : left.kind === "start" ? -1 : 1));
      state.preview.eventIndex = 0;
      diagnostic("preview_started", "info", { count: steps.length });

      const advancePreview = now => {
        if (!state.preview.active) return;
        const logicalElapsed = playbackScale > 0 ? (now - state.preview.startedAt) / playbackScale : total;
        let changed = false;
        while (state.preview.eventIndex < state.preview.events.length && state.preview.events[state.preview.eventIndex].at_ms <= logicalElapsed) {
          const event = state.preview.events[state.preview.eventIndex++];
          if (event.kind === "start") {
            state.preview.statuses.set(event.step.node_id, "running");
            state.preview.logs.push({ offset_ms: event.step.offset_ms, node_id: event.step.node_id, message: `Synthetic preview started for ${event.step.node_id}.` });
          } else {
            state.preview.statuses.set(event.step.node_id, "succeeded");
            state.preview.logs.push({ offset_ms: event.step.offset_ms + event.step.duration_ms, node_id: event.step.node_id, message: `Synthetic preview completed in ${event.step.duration_ms}ms.` });
          }
          changed = true;
        }
        const completed = state.preview.eventIndex >= state.preview.events.length;
        if (completed) {
          state.preview.active = false;
          state.preview.frameId = null;
          state.preview.events = [];
          state.preview.eventIndex = 0;
          diagnostic("preview_completed", "info", { count: steps.length, duration_ms: total });
        } else {
          state.preview.frameId = window.requestAnimationFrame(advancePreview);
        }
        if (changed || completed) renderAll();
      };

      state.preview.frameId = window.requestAnimationFrame(advancePreview);
      renderAll();
    }

    function stopPreviewTimers() {
      if (state.preview.frameId !== null) window.cancelAnimationFrame(state.preview.frameId);
      state.preview.frameId = null;
      state.preview.events = [];
      state.preview.eventIndex = 0;
      state.preview.active = false;
    }

    function exportableModel() {
      const model = deepClone(state.model);
      model.graph.metadata.name = state.model.graph.metadata.name;
      return model;
    }

    function saveLocal() {
      try {
        if (state.model.artifact.id !== EMBEDDED_ARTIFACT_ID) throw new Error("storage_artifact_mismatch");
        const saved = exportableModel();
        saved.runtime.observed_runs = [];
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(saved));
        dom.saveState.textContent = `saved ${new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}`;
        diagnostic("storage_save_succeeded", "info", { count: saved.graph.nodes.length });
        showToast("Local draft saved without observed runs.", "success");
      } catch (error) {
        const code = errorCode(error);
        diagnostic("storage_save_failed", "error", { error_code: code });
        dom.saveState.textContent = "memory only";
        showToast(code === "storage_artifact_mismatch" ? "Local save is limited to the embedded workflow artifact." : "Local storage is unavailable. The editor remains in memory.", "error");
      }
    }

    function loadLocal() {
      try {
        const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!parsed || !parsed.artifact || parsed.artifact.id !== EMBEDDED_ARTIFACT_ID) throw new Error("storage_artifact_mismatch");
        const loaded = normalizeModel(parsed);
        if (loaded.artifact.id !== EMBEDDED_ARTIFACT_ID) throw new Error("storage_artifact_mismatch");
        const candidateIssues = validateGraph(loaded);
        if (candidateIssues.some(item => item.severity === "error")) throw new Error("import_validation_failed");
        loaded.runtime.observed_runs = [];
        state.model = loaded;
        state.issues = validateGraph();
        diagnostic("storage_load_succeeded", "info", { count: loaded.graph.nodes.length });
        dom.saveState.textContent = "restored local";
      } catch (error) {
        diagnostic("storage_load_failed", "error", { error_code: errorCode(error) });
        dom.saveState.textContent = "local restore failed";
      }
    }

    function downloadJson(filename, value) {
      const blob = new Blob([JSON.stringify(value, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.append(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 0);
    }

    function exportModel() {
      downloadJson(`${state.model.artifact.id}.workflow.json`, exportableModel());
      diagnostic("export_succeeded", "info", { count: state.model.graph.nodes.length });
      showToast("Workflow JSON exported.", "success");
    }

    function exportDiagnostics() {
      downloadJson("workflow-canvas.diagnostics.json", { schema_version: "workflow-canvas-diagnostics/1", records: state.diagnostics });
    }

    async function importFile(file) {
      diagnostic("import_started");
      if (!file || file.size > IMPORT_LIMIT_BYTES) {
        diagnostic("import_failed", "error", { error_code: "file_too_large" });
        showToast("Import rejected. JSON must be 1 MB or smaller.", "error");
        return;
      }
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        if (parsed.schema_version === "workflow-observed-run/1") {
          if (!hasExactKeys(parsed, ["schema_version", "observed_run"])) throw new Error("invalid_observed_run");
          const normalizedRun = normalizeObservedRun(parsed.observed_run);
          if (!normalizedRun) throw new Error("invalid_observed_run");
          const run = await verifyObservedRun(normalizedRun, state.model);
          state.model.runtime.observed_runs = state.model.runtime.observed_runs.filter(item => item.id !== run.id).concat(run);
          diagnostic("import_succeeded", "info", { count: run.steps.length });
          if (run.verification.status === "verified") {
            resetSyntheticPreview();
            state.observedRunId = run.id;
            state.mode = "trace";
            showToast(`Verified observed ${run.provenance.type} imported. Trace is now available.`, "success");
          } else {
            state.observedRunId = observedRun() ? observedRun().id : null;
            if (state.mode === "trace") state.mode = "design";
            diagnostic("observed_verification_failed", "warn", { error_code: "untrusted_observed_claim" });
            showToast("Observed claim imported as unverified evidence. Trace remains disabled.", "error");
          }
        } else {
          const normalized = normalizeModel(parsed);
          const candidateIssues = validateGraph(normalized);
          if (candidateIssues.some(item => item.severity === "error")) throw new Error("import_validation_failed");
          normalized.runtime.observed_runs = await verifyObservedRuns(normalized.runtime.observed_runs, normalized);
          resetSyntheticPreview();
          if (state.mode === "preview") state.mode = "design";
          state.model = normalized;
          state.history = [];
          state.future = [];
          state.selected = null;
          const verifiedRun = verifiedObservedRuns()[0] || null;
          state.observedRunId = verifiedRun ? verifiedRun.id : null;
          if (!verifiedRun && state.mode === "trace") state.mode = "design";
          const unverifiedCount = normalized.runtime.observed_runs.filter(run => run.verification.status !== "verified").length;
          diagnostic("model_loaded", "info", { count: normalized.graph.nodes.length });
          diagnostic("import_succeeded", "info", { count: normalized.graph.nodes.length });
          showToast(unverifiedCount ? `Workflow model imported with ${unverifiedCount} unverified observed claim(s).` : "Workflow model imported.", unverifiedCount ? "error" : "success");
        }
        state.issues = validateGraph();
        renderAll();
        fitView();
      } catch (error) {
        diagnostic("import_failed", "error", { error_code: errorCode(error) });
        showToast("Import rejected. The file does not satisfy the workflow contract.", "error");
      } finally {
        dom.importFile.value = "";
      }
    }

    function showToast(message, kind = "info") {
      const toast = create("div", `toast ${kind}`, message);
      dom.toastStack.append(toast);
      window.setTimeout(() => toast.remove(), 3200);
    }

    function bindEvents() {
      dom.paletteSearch.addEventListener("input", renderPalette);
      dom.canvas.addEventListener("dragover", event => { if (event.dataTransfer.types.includes("application/x-workflow-node-type")) { event.preventDefault(); event.dataTransfer.dropEffect = "copy"; } });
      dom.canvas.addEventListener("drop", event => { const type = event.dataTransfer.getData("application/x-workflow-node-type"); if (!type) return; event.preventDefault(); addNodeFromType(type, screenToWorld(event.clientX, event.clientY)); });
      dom.canvas.addEventListener("pointerdown", startPan);
      window.addEventListener("pointermove", event => { moveNodeDrag(event); moveConnection(event); movePan(event); });
      window.addEventListener("pointerup", event => { endNodeDrag(); endConnection(event); endPan(); });
      dom.canvas.addEventListener("wheel", event => {
        event.preventDefault();
        if (event.ctrlKey || event.metaKey) setZoom(state.view.scale * (event.deltaY > 0 ? .9 : 1.1), event.clientX, event.clientY);
        else { state.view.x -= event.deltaX || 0; state.view.y -= event.deltaY; applyView(); renderMinimap(); }
      }, { passive: false });
      el("zoom-in").addEventListener("click", () => setZoom(state.view.scale * 1.15));
      el("zoom-out").addEventListener("click", () => setZoom(state.view.scale / 1.15));
      el("fit-view").addEventListener("click", fitView);
      el("palette-collapse").addEventListener("click", () => { dom.body.classList.toggle("palette-collapsed"); window.setTimeout(() => { fitView(); }, 0); });
      el("inspector-collapse").addEventListener("click", () => { dom.body.classList.toggle("inspector-collapsed"); window.setTimeout(() => { fitView(); }, 0); });
      el("bottom-collapse").addEventListener("click", () => { state.bottomCollapsed = !state.bottomCollapsed; renderBottom(); });
      dom.bottomTabs.addEventListener("click", event => { const button = event.target.closest("[data-tab]"); if (!button) return; state.bottomTab = button.dataset.tab; state.bottomCollapsed = false; renderBottom(); });
      dom.bottomTabs.addEventListener("keydown", event => {
        if (!["ArrowLeft", "ArrowRight", "Home", "End"].includes(event.key)) return;
        const tabs = Array.from(dom.bottomTabs.querySelectorAll("[data-tab]"));
        const current = Math.max(0, tabs.indexOf(document.activeElement));
        const next = event.key === "Home" ? 0 : event.key === "End" ? tabs.length - 1 : (current + (event.key === "ArrowRight" ? 1 : -1) + tabs.length) % tabs.length;
        event.preventDefault();
        tabs[next].click();
        tabs[next].focus();
      });
      dom.modeTabs.addEventListener("click", event => {
        const button = event.target.closest("[data-mode]");
        if (!button || button.disabled) return;
        state.mode = button.dataset.mode;
        if (state.mode === "preview" && !state.preview.logs.length) startSyntheticPreview(); else renderAll();
      });
      el("preview-button").addEventListener("click", startSyntheticPreview);
      el("validate-button").addEventListener("click", () => { state.issues = validateGraph(); state.bottomTab = "validation"; state.bottomCollapsed = false; renderAll(); showToast(state.issues.length ? `${state.issues.length} validation issue(s) found.` : "Validation passed.", state.issues.length ? "error" : "success"); });
      el("save-button").addEventListener("click", saveLocal);
      el("export-button").addEventListener("click", exportModel);
      el("import-button").addEventListener("click", () => dom.importFile.click());
      dom.importFile.addEventListener("change", event => importFile(event.target.files[0]));
      el("undo-button").addEventListener("click", undo);
      el("redo-button").addEventListener("click", redo);
      dom.graphTitle.addEventListener("change", event => mutate(() => { state.model.graph.metadata.name = cleanString(event.target.value, "Workflow Canvas", 120); state.model.artifact.title = state.model.graph.metadata.name; }, "node_updated"));
      window.addEventListener("keydown", event => {
        if (event.key === "/" && !isFormField(event.target)) { event.preventDefault(); dom.paletteSearch.focus(); }
        if ((event.key === "Delete" || event.key === "Backspace") && !isFormField(event.target)) { event.preventDefault(); deleteSelected(); }
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z" && !isFormField(event.target)) { event.preventDefault(); event.shiftKey ? redo() : undo(); }
        if (event.key === "Escape") { state.connection = null; dom.canvas.classList.remove("connecting"); renderEdges(); }
      });
      window.addEventListener("resize", () => { renderMinimap(); });
      window.addEventListener("error", event => diagnostic("unhandled_error", "error", { error_code: errorCode(event.error || new Error("window_error")) }));
      window.addEventListener("unhandledrejection", event => diagnostic("unhandled_rejection", "error", { error_code: errorCode(event.reason) }));
    }

    async function init() {
      diagnostic("app_init");
      diagnostic("model_loaded", "info", { count: state.model.graph.nodes.length });
      loadLocal();
      state.model.runtime.observed_runs = await verifyObservedRuns(state.model.runtime.observed_runs, state.model);
      const verifiedRun = verifiedObservedRuns()[0] || null;
      state.observedRunId = verifiedRun ? verifiedRun.id : null;
      state.issues = validateGraph();
      bindEvents();
      renderAll();
      window.setTimeout(fitView, 0);
    }

    init().catch(error => {
      diagnostic("unhandled_rejection", "error", { error_code: errorCode(error) });
      showToast("Initialization failed. Open Diagnostics for the safe error code.", "error");
    });
  })();
  </script>
</body>
</html>
